<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fundo preto -->
  <rect width="1200" height="630" fill="#050508"/>

  <!-- Grid decorativo -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(179,71,255,0.06)" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(179,71,255,0.12);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(5,5,8,0);stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Grid de fundo -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow radial roxo -->
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow-bg)" opacity="0.7"/>

  <!-- Bordas cantos estilo cyberpunk -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="rgba(179,71,255,0.3)" stroke-width="2"/>
  <rect x="0" y="0" width="20" height="20" fill="#b347ff"/>
  <rect x="1180" y="0" width="20" height="20" fill="#b347ff"/>
  <rect x="0" y="610" width="20" height="20" fill="#b347ff"/>
  <rect x="1180" y="610" width="20" height="20" fill="#b347ff"/>

  <!-- Linha decorativa superior -->
  <line x1="0" y1="80" x2="1200" y2="80" stroke="rgba(179,71,255,0.12)" stroke-width="1"/>
  <line x1="0" y1="550" x2="1200" y2="550" stroke="rgba(179,71,255,0.12)" stroke-width="1"/>

  <!-- Badge -->
  <rect x="450" y="115" width="300" height="30" rx="0" fill="rgba(179,71,255,0.08)" stroke="rgba(179,71,255,0.3)" stroke-width="1"/>
  <text x="600" y="135" text-anchor="middle" font-family="monospace" font-size="12" fill="#b347ff" letter-spacing="4">// LAROCA.DEV — DESENVOLVIMENTO WEB</text>

  <!-- Logo principal -->
  <text x="600" y="270" text-anchor="middle" font-family="'Orbitron', monospace" font-size="100" font-weight="900" fill="#b347ff" filter="url(#glow-filter)" letter-spacing="-2">LAROCA DEV</text>

  <!-- Efeito glow no texto -->
  <defs>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Texto glitch decorativo (offset) -->
  <text x="603" y="270" text-anchor="middle" font-family="'Orbitron', monospace" font-size="100" font-weight="900" fill="#ff006e" opacity="0.15" letter-spacing="-2">LAROCA DEV</text>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="monospace" font-size="22" fill="#d4a8ff" letter-spacing="2">Seu projeto precisa chamar atenção — não só existir.</text>

  <!-- Linha separadora -->
  <line x1="300" y1="390" x2="900" y2="390" stroke="rgba(179,71,255,0.2)" stroke-width="1"/>

  <!-- Serviços -->
  <text x="270" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(179,71,255,0.7)" letter-spacing="2">▸ SITES INSTITUCIONAIS</text>
  <text x="490" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(179,71,255,0.7)" letter-spacing="2">▸ LANDING PAGES</text>
  <text x="710" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(179,71,255,0.7)" letter-spacing="2">▸ SISTEMAS WEB &amp; APIS</text>
  <text x="940" y="440" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(179,71,255,0.7)" letter-spacing="2">▸ CONSULTORIA DE TI</text>

  <!-- URL -->
  <text x="600" y="510" text-anchor="middle" font-family="monospace" font-size="18" fill="rgba(212,168,255,0.5)" letter-spacing="4">laroca.dev</text>

  <!-- Localização -->
  <text x="600" y="540" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(74,85,104,0.8)" letter-spacing="3">CASTRO, PR — BRASIL</text>
</svg>
